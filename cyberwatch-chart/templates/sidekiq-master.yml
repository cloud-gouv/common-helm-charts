{{- if and .Values.sidekiqMaster.enabled (ne .Values.node.type "satellite") }}
{{ include "cbw.service" (dict "name" "sidekiq-master" "root" $) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sidekiq-master
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sidekiq-master
  strategy:
    type: {{ .Values.UpdateStrategyType }}
  template:
    metadata:
      labels:
        app: sidekiq-master
        {{- if .Values.sidekiqMaster.extraLabels }}
        {{- toYaml .Values.sidekiqMaster.extraLabels | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "cbw.fileCheckSum" (dict "file" "secret.yml" "context" $) | nindent 8 }}
        {{- include "cbw.fileCheckSum" (dict "file" "config.yml" "context" $) | nindent 8 }}
        {{- if .Values.sidekiqMaster.extraAnnotations }}
        {{- toYaml $.Values.sidekiqMaster.extraAnnotations | nindent 8 }}
        {{- end }}
    spec:
      hostAliases: {{- include "cbw.render" (dict "value" (concat .Values.sidekiqMaster.hostAliases .Values.global.hostAliases) "context" $) | nindent 8 }}
      nodeSelector: {{- include "cbw.render" (dict "value" .Values.sidekiqMaster.nodeSelector "context" $) | nindent 8 }}
      containers:
        {{- include "cbw.image" (dict "image" .Values.sidekiqMaster.image "global" .Values.global) | nindent 6 }}
        name: sidekiq-master
        resources:
{{ toYaml .Values.sidekiqMaster.resources | indent 10 }}
        command: ["./docker-entrypoint.sh"]
        args: ["sidekiq_master"]
        securityContext:
          allowPrivilegeEscalation: false
        env:
        - name: REDIS_HOST
          value: {{ .Values.redis.host }}
{{ include "cbw.nodeName" . | indent 8 }}
{{ include "cbw.env-config" (dict "key" "redis_tls_ca"             "env" "REDIS_TLS_CA")       | indent 8 }}
{{- if (ne .Values.database.tls.mode "disabled") }}
{{ include "cbw.env-config" (dict "key" "db_tls_ca"             "env" "DB_TLS_CA")             | indent 8 }}
{{- end }}
{{- if .Values.database.tls.mode }}
{{ include "cbw.env-config" (dict "key" "db_tls_mode" "env" "DB_TLS_MODE") | indent 8 }}
{{- end }}
{{- if .Values.database.tls.verify }}
{{ include "cbw.env-config" (dict "key" "db_tls_verify" "env" "DB_TLS_VERIFY") | indent 8 }}
{{- end }}
{{ include "cbw.env-secret" (dict "key" "mysql-hostname" "env" "MYSQL_HOSTNAME") | indent 8 }}
{{ include "cbw.env-secret" (dict "key" "mysql-database" "env" "MYSQL_DATABASE") | indent 8 }}
{{ include "cbw.env-secret" (dict "key" "mysql-root-password" "env" "MYSQL_ROOT_PASSWORD" "secretRef" .Values.database.rootPasswordSecret) | indent 8 }}
{{ include "cbw.env-secret" (dict "key" "mysql-password" "env" "MYSQL_PASSWORD" "secretRef" .Values.database.passwordSecret) | indent 8 }}
{{ include "cbw.env-secret" (dict "key" "mysql-user" "env" "MYSQL_USER") | indent 8 }}
{{ include "cbw.env-secret" (dict "key" "mysql-port" "env" "MYSQL_PORT") | indent 8 }}
{{ include "cbw.env-secret" (dict "key" "redis-password" "env" "REDIS_PASSWORD" "secretRef" .Values.redis.passwordSecret) | indent 8 }}
{{ include "cbw.env-secret" (dict "key" "secret-key-base" "env" "SECRET_KEY_BASE" "secretRef" .Values.key.baseSecret) | indent 8 }}
{{ include "cbw.env-secret" (dict "key" "secret-key-credential" "env" "SECRET_KEY_CREDENTIAL" "secretRef" .Values.key.credentialSecret) | indent 8 }}
        {{- if .Values.containerScanner.enabled }}
        - name: CONTAINER_SCANNER_PRESENT
          value: "true"
        {{- end }}
        - name: CBW_CHART_VERSION
          value: {{ .Chart.Version }}
        {{- if .Values.sidekiqMaster.extraEnvVars }}
        {{- include "cbw.render" (dict "value" .Values.sidekiqMaster.extraEnvVars "context" $) | nindent 8 }}
        {{- end }}
        {{- range $key, $value := .Values.sidekiqMaster.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        volumeMounts:
        {{- if .Values.database.external }}
        - name: db-ca
          mountPath: /run/secrets/db
          readOnly: true
        {{- end }}
        {{- if .Values.redis.external }}
        - name: redis-ca
          mountPath: /run/secrets/redis
          readOnly: true
        {{- end }}
        - name: root-ca
          mountPath: /run/secrets/certs
          readOnly: true
        {{- if include "cbw.isOffline" . }}
        - name: data-uploads
          mountPath: /uploads
        {{- end }}
        {{- if .Values.sidekiqMaster.extraVolumeMounts }}
        {{- include "cbw.render" (dict "value" .Values.sidekiqMaster.extraVolumeMounts "context" $) | nindent 8 }}
        {{- end }}
      volumes:
      {{- if include "cbw.isOffline" . }}
      - name: data-uploads
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}-data-uploads-claim
      {{- end }}
      {{- if .Values.database.external }}
      - name: db-ca
        secret:
          {{- if .Values.database.tls.secret }}
          secretName: {{ .Values.database.tls.secret }}
          {{- else }}
          secretName: {{ .Values.internalCbw.database.tls.rootCaHelmSecret }}
          {{- end }}
          defaultMode: 0444
          items:
          - key: {{ .Values.internalCbw.database.tls.rootCaFilename }}
            path: {{ .Values.internalCbw.database.tls.rootCaFilename }}
      {{- end }}
      {{- if .Values.redis.external }}
      - name: redis-ca
        secret:
          {{- if .Values.redis.tls.secret }}
          secretName: {{ .Values.redis.tls.secret }}
          {{- else }}
          secretName: {{ .Values.internalCbw.redis.tls.rootCaHelmSecret }}
          {{- end }}
          defaultMode: 0444
          items:
          - key: {{ .Values.internalCbw.redis.tls.rootCaFilename }}
            path: {{ .Values.internalCbw.redis.tls.rootCaFilename }}
      {{- end }}
      - name: root-ca
        secret:
          {{- if eq .Values.node.type "satellite" }}
          secretName: {{ .Values.global.pki.root_ca }}
          {{- else }}
          secretName: {{ .Values.internalCbw.global.tls.CaSecret }}
          defaultMode: 0444
          items:
          - key: {{ .Values.internalCbw.global.tls.rootCaFilename }}
            path: cbw-root-ca-cert.pem
          {{- end }}
      {{- if .Values.sidekiqMaster.extraVolumes }}
      {{- include "cbw.render" (dict "value" .Values.sidekiqMaster.extraVolumes "context" $) | nindent 6 }}
      {{- end }}
      {{- include "cbw.imagePullSecrets" (dict "image" .Values.sidekiqMaster.image "global" .Values.global) | nindent 6 }}
{{- end }}
