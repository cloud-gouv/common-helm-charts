apiVersion: v1
kind: ConfigMap
metadata:
  name: clustertcl-backup-script-config
  namespace: {{ .Values.namespace }}
data:
{{ (tpl (.Files.Glob "scripts/backup.sh").AsConfig .) | indent 2 }}
{{ (tpl (.Files.Glob "scripts/createkubectlconfig.sh").AsConfig .) | indent 2 }}
{{ (tpl (.Files.Glob "scripts/clusterctl_backup_to_s3.sh").AsConfig .) | indent 2 }}
{{ (tpl (.Files.Glob "scripts/clusterctl_backup_retention.sh").AsConfig .) | indent 2 }}
