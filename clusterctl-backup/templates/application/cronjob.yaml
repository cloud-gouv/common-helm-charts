apiVersion: batch/v1
kind: CronJob
metadata:
  name: dailyclusterbackup
  namespace: {{ .Values.namespace }} 
spec:
  schedule: {{ .Values.backup.schedule | default "10 0 * * *" }}
  {{- if not .Values.backup.enabled }}
  suspend: true
  {{- end }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          serviceAccountName: clusterctl-backup
          restartPolicy: Never
          securityContext:
          {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
          - name: crontab
            securityContext:
            {{- toYaml .Values.securityContext | nindent 14 }}
            image: "{{ .Values.image.registry}}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            command: ["/bin/bash", "-euo", "pipefail", "-c",]
            args:
            - |
              echo "Script execution started at $(date)"
              /etc/scripts/backup.sh
              echo "Script execution completed at $(date)"
            envFrom:
              - secretRef:
                  name: s3-outscale-clusterctl-backup
            env:
              - name: KUBECONFIG
                value: "/app/kubeconfig"
              {{- with .Values.env }}
              {{- toYaml . | nindent 14 }}
              {{- end }}
            volumeMounts:
            - mountPath: /etc/scripts
              name: script-volume
            - name: k8s-api-token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
            - mountPath: /app
              name: tmpfs
            - mountPath: /backup
              name: tmpfs-backup
          volumes:
          - name: tmpfs
            emptyDir: {}
          - name: tmpfs-backup
            emptyDir:
              medium: "Memory"
              sizeLimit: {{ .Values.storageSize }}
          - name: script-volume
            configMap:
              defaultMode: 0555
              name: clustertcl-backup-script-config
          - name: k8s-api-token
            projected:
              sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
              - configMap:
                  name: kube-root-ca.crt
                  items:
                  - key: ca.crt
                    path: ca.crt
              - downwardAPI:
                  items:
                  - path: namespace
                    fieldRef:
                      fieldPath: metadata.namespace
