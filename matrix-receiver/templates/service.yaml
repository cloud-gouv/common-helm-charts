apiVersion: v1
kind: Service
metadata:
  name: {{ include "matrix-receiver.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "matrix-receiver.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 80
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "matrix-receiver.selectorLabels" . | nindent 4 }}
