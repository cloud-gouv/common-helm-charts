{{- range .Values.backends }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: {{ .name }}
  namespace: {{ include "envoy-gateway-routes.namespace" (list . $) }}
  labels:
    {{- include "envoy-gateway-routes.labels" $ | nindent 4 }}
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annot := dict "globalAnnotations" $.Values.global.annotations "localAnnotations" .annotations }}
  {{- with include "envoy-gateway-routes.annotations" $annot }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  endpoints:
  {{- range .endpoints }}
    - {{- if .fqdn }}
      fqdn:
        hostname: {{ .fqdn.hostname }}
        port: {{ .fqdn.port }}
      {{- end }}
      {{- if .ip }}
      ip:
        address: {{ .ip.address }}
        port: {{ .ip.port }}
      {{- end }}
      {{- if .unix }}
      unix:
        path: {{ .unix.path }}
      {{- end }}
  {{- end }}
  {{- with .appProtocols }}
  appProtocols:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .fallback }}
  fallback: {{ . }}
  {{- end }}
{{- end }}