# =============================================================================
# ReferenceGrant
# Authorise cross-namespace references (route → service in another namespace)
# =============================================================================
referenceGrants: []
# - name: allow-gateway-to-app
#   namespace: app-namespace            # namespace of the TARGET resources
#   from:
#     # Allow HTTPRoutes in gateway-namespace to reference Services here
#     - group: gateway.networking.k8s.io
#       kind: HTTPRoute
#       namespace: gateway-namespace
#     # Allow the Gateway itself (for TLS secrets)
#     - group: gateway.networking.k8s.io
#       kind: Gateway
#       namespace: envoy-gateway-system
#   to:
#     - group: ""
#       kind: Service                   # allow all Services in this namespace
#     - group: ""
#       kind: Secret
#       name: my-tls-secret             # restrict to a specific secret

