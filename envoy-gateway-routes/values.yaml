# =============================================================================
# Envoy Gateway Routes — Helm Chart Values
# Docs: https://gateway.envoyproxy.io/docs/
# Gateway API spec: https://gateway-api.sigs.k8s.io/
# =============================================================================

global:
  namespace: ""
  labels: {}
  annotations: {}

# =============================================================================
# Gateway
# Entry point: defines listeners (HTTP, HTTPS, TCP, TLS, UDP)
# =============================================================================
gateways: []
# - name: my-gateway
#   namespace: ""
#   labels: {}
#   annotations:
#     cert-manager.io/cluster-issuer: letsencrypt-prod
#
#   # GatewayClass — "eg" is the default Envoy Gateway class name
#   gatewayClassName: eg
#
#   # Optional: labels/annotations pushed to the generated Envoy Deployment/Service
#   infrastructure:
#     labels:
#       app: my-gateway
#     annotations:
#       service.beta.kubernetes.io/aws-load-balancer-type: nlb
#
#   listeners:
#     # ── Plain HTTP listener ────────────────────────────────────────────────
#     - name: http
#       protocol: HTTP
#       port: 80
#       hostname: "*.example.com"          # optional wildcard
#       allowedRoutes:
#         namespaces:
#           from: All                      # Same | All | Selector
#         kinds:
#           - group: gateway.networking.k8s.io
#             kind: HTTPRoute
#
#     # ── HTTPS listener (TLS Terminate) ────────────────────────────────────
#     - name: https
#       protocol: HTTPS
#       port: 443
#       hostname: "*.example.com"
#       tls:
#         mode: Terminate                  # Terminate | Passthrough
#         certificateRefs:
#           - group: ""
#             kind: Secret
#             name: wildcard-tls-secret
#             namespace: cert-manager
#       allowedRoutes:
#         namespaces:
#           from: All
#
#     # ── TLS Passthrough listener ──────────────────────────────────────────
#     - name: tls-passthrough
#       protocol: TLS
#       port: 8443
#       tls:
#         mode: Passthrough
#       allowedRoutes:
#         namespaces:
#           from: All
#         kinds:
#           - group: gateway.networking.k8s.io
#             kind: TLSRoute
#
#     # ── TCP listener ──────────────────────────────────────────────────────
#     - name: tcp-5432
#       protocol: TCP
#       port: 5432
#       allowedRoutes:
#         namespaces:
#           from: Same
#         kinds:
#           - group: gateway.networking.k8s.io
#             kind: TCPRoute
#
#     # ── UDP listener ──────────────────────────────────────────────────────
#     - name: udp-53
#       protocol: UDP
#       port: 53
#       allowedRoutes:
#         namespaces:
#           from: Same
#         kinds:
#           - group: gateway.networking.k8s.io
#             kind: UDPRoute

# Cas une seule classe (défaut EG)
# gatewayClasses:
#   - name: eg
#     controllerName: gateway.envoyproxy.io/gatewayclass-controller

# # Cas deux classes public/privé ou plus
# gatewayClasses:
#   - name: public-gateway
#     description: "Internet-facing gateway"
#     controllerName: gateway.envoyproxy.io/gatewayclass-controller

#   - name: private-gateway
#     description: "Internal/admin gateway"
#     controllerName: gateway.envoyproxy.io/gatewayclass-controller
#     parametersRef:
#       kind: EnvoyProxy
#       name: private-envoy-proxy
#       namespace: envoy-gateway-system

certificates: []
