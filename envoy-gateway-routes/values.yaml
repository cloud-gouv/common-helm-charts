# =============================================================================
# HTTPRoute
# L7 HTTP/HTTPS routing with matches, filters, weights, timeouts
# =============================================================================
httpRoutes: []
# - name: my-app-route
#   namespace: ""
#   labels: {}
#   annotations:
#     external-dns.alpha.kubernetes.io/ttl: "300"
#
#   # Which Gateway listener this route attaches to
#   parentRefs:
#     - name: my-gateway
#       namespace: envoy-gateway           # omit if same namespace
#       sectionName: https                 # omit to attach to all listeners
#
#   hostnames:
#     - app.example.com
#
#   rules:
#     # ── Simple path prefix → single backend ───────────────────────────────
#     - name: default
#       matches:
#         - path:
#             type: PathPrefix             # PathPrefix | Exact | RegularExpression
#             value: /
#       backendRefs:
#         - name: my-app-service
#           port: 8080
#           weight: 100                    # default: 1
#
#     # ── Exact path ────────────────────────────────────────────────────────
#     - name: api-exact
#       matches:
#         - path:
#             type: Exact
#             value: /api/v1/status
#       backendRefs:
#         - name: status-service
#           port: 8080
#
#     # ── Regex path (Envoy Gateway extension) ──────────────────────────────
#     - name: api-regex
#       matches:
#         - path:
#             type: RegularExpression
#             value: "^/api/v[0-9]+/.*"
#       backendRefs:
#         - name: api-service
#           port: 8080
#
#     # ── Header-based routing ──────────────────────────────────────────────
#     - name: canary
#       matches:
#         - headers:
#             - name: x-canary
#               value: "true"
#               type: Exact
#       backendRefs:
#         - name: canary-service
#           port: 8080
#
#     # ── Method-based routing ──────────────────────────────────────────────
#     - name: write-ops
#       matches:
#         - method: POST
#           path:
#             type: PathPrefix
#             value: /api
#         - method: PUT
#           path:
#             type: PathPrefix
#             value: /api
#         - method: DELETE
#           path:
#             type: PathPrefix
#             value: /api
#       backendRefs:
#         - name: write-service
#           port: 8080
#
#     # ── Query param routing ───────────────────────────────────────────────
#     - name: legacy-api
#       matches:
#         - queryParams:
#             - name: version
#               value: "v1"
#       backendRefs:
#         - name: legacy-service
#           port: 8080
#
#     # ── Traffic splitting (weighted) ──────────────────────────────────────
#     - name: blue-green
#       matches:
#         - path:
#             type: PathPrefix
#             value: /
#       backendRefs:
#         - name: app-v2
#           port: 8080
#           weight: 80
#         - name: app-v1
#           port: 8080
#           weight: 20
#
#     # ── URL rewrite ───────────────────────────────────────────────────────
#     - name: rewrite-prefix
#       matches:
#         - path:
#             type: PathPrefix
#             value: /old-api
#       filters:
#         - type: URLRewrite
#           urlRewrite:
#             path:
#               type: ReplacePrefixMatch
#               replacePrefixMatch: /new-api
#       backendRefs:
#         - name: api-service
#           port: 8080
#
#     # ── Request redirect (301/302) ────────────────────────────────────────
#     - name: redirect-to-https
#       matches:
#         - path:
#             type: PathPrefix
#             value: /
#       filters:
#         - type: RequestRedirect
#           requestRedirect:
#             scheme: https
#             statusCode: 301
#
#     # ── Redirect with path change ─────────────────────────────────────────
#     - name: redirect-renamed-path
#       matches:
#         - path:
#             type: PathPrefix
#             value: /legacy
#       filters:
#         - type: RequestRedirect
#           requestRedirect:
#             path:
#               type: ReplacePrefixMatch
#               replacePrefixMatch: /modern
#             statusCode: 301
#
#     # ── Add/remove request headers ────────────────────────────────────────
#     - name: header-manipulation
#       matches:
#         - path:
#             type: PathPrefix
#             value: /
#       filters:
#         - type: RequestHeaderModifier
#           requestHeaderModifier:
#             set:
#               - name: x-forwarded-proto
#                 value: https
#             add:
#               - name: x-request-source
#                 value: envoy-gateway
#             remove:
#               - x-internal-token
#         - type: ResponseHeaderModifier
#           responseHeaderModifier:
#             set:
#               - name: Strict-Transport-Security
#                 value: "max-age=31536000; includeSubDomains"
