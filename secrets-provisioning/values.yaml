# ── Shared infra (often merged from global values) ─────────────────────
clusterName: ""
environment: ""
baoAddr: ""
secretStoreName: ""
forceRotatePassword: false
jobNamespace: "secrets-provisioning"
image: "ghcr.io/cloud-gouv/cluster-secret-provisioning-image:sha-4d44374"
rbac:
  create: true

# ── PushSecret mappings (secretKey -> property in Bao) ─────────────────
# Default: a single "password" field
pushMappings:
  # - secretKey: login
  #   property: login
  #   value: admin
  - secretKey: password
    property: password

# ── Generation script (overridable per component) ───────────────────────
# use the encryption you need
generator:
  override: false
  command: |
    argocd account bcrypt --password "$(openssl rand -base64 24 | tr -d '\n')"