{{- range .Values.envoyPatchPolicies }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyPatchPolicy
metadata:
  name: {{ .name }}
  namespace: {{ include "envoy-gateway-policies.namespace" (list . $) }}
  labels:
    {{- include "envoy-gateway-policies.labels" $ | nindent 4 }}
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annot := dict "globalAnnotations" $.Values.global.annotations "localAnnotations" .annotations }}
  {{- with include "envoy-gateway-policies.annotations" $annot }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- include "envoy-gateway-policies.targetRef" .targetRef | nindent 2 }}
  type: {{ .patchType | default "JSONPatch" }}
  {{- with .priority }}
  priority: {{ . }}
  {{- end }}
  jsonPatches:
  {{- range .patches }}
    - type: {{ .type }}
      name: {{ .name }}
      operation:
        op: {{ .operation.op }}
        path: {{ .operation.path }}
        {{- with .operation.from }}
        from: {{ . }}
        {{- end }}
        {{- if hasKey .operation "value" }}
        value: {{ .operation.value | toJson }}
        {{- end }}
  {{- end }}
{{- end }}
