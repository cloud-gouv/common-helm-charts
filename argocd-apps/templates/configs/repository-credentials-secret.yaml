{{- range $repo_cred_key, $repo_cred_value := .Values.configs.credentialTemplates }}
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-repo-creds-{{ $repo_cred_key }}
  namespace: {{ $.Values.namespace }}
  labels:
    argocd.argoproj.io/secret-type: repo-creds
  {{- with $.Values.configs.credentialTemplatesAnnotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
stringData:
  {{- range $key, $value := $repo_cred_value }}
  {{ $key }}: {{ $value | toString }}
  {{- end }}
{{- end }}
{{- range $repo_cred_key, $repo_cred_value := .Values.configs.credentialTemplatesBase64 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-repo-creds-{{ $repo_cred_key }}
  namespace: {{ $.Values.namespace }}
  labels:
    argocd.argoproj.io/secret-type: repo-creds
  {{- with $.Values.configs.credentialTemplatesAnnotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
data:
  {{- range $key, $value := $repo_cred_value }}
  {{ $key }}: {{ $value | toString | b64enc }}
  {{- end }}
{{- end }}

