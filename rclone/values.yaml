replicaCount: 1
namespace: ""
image:
  repository: rclone/rclone
  pullPolicy: IfNotPresent
  tag: "1.72"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podSecurityContext:
  fsGroup: 2000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

command: {}
args: {}
envFrom: {}
env: {}

secretName: rclone-config
config: |
  [outscale-oos]
  type = s3
  provider = Outscale
  access_key_id = 
  secret_access_key = 
  endpoint = https://oos.eu-west-2.outscale.com
  region = eu-west-1
  acl = private
  force_path_style = true

  [encrypted]
  type = crypt
  remote = outscale-oos:demo
  filename_encryption = standard
  directory_name_encryption = true
  password = 
  password2 = 

service:
  name: rclone-backup-gateway
  type: ClusterIP
  port: 8080

resources: 
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Additional volumes on the output Deployment definition.
volumes: 
  - name: rclone-config
    secret:
      secretName: rclone-config

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - name: rclone-config
    mountPath: /config
    readOnly: true