name: Publish Helm charts to GHCR (OCI) - feat branch tags

on:
  push:
    branches:
      - 'feat/**'

  workflow_dispatch:
    inputs:
      charts:
        description: 'Charts à publier (séparés par des virgules). Laisser vide pour tous les charts.'
        required: false
        default: ''

jobs:
  publish-dev:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Login to GHCR
        run: |
          echo "${{ github.token }}" \
            | helm registry login ghcr.io \
                -u "${{ github.actor }}" \
                --password-stdin

      - name: Package and push selected dev charts
        env:
          OWNER: ${{ github.repository_owner }}
          SHA: ${{ github.sha }}
          SELECTED_CHARTS: ${{ github.event.inputs.charts }}
        run: |
          set -euo pipefail

          repo="oci://ghcr.io/${OWNER}/common-helm-charts"
          short_sha="${SHA:0:7}"

          mkdir -p dist

          echo "Selected charts: ${SELECTED_CHARTS:-<all>}"

          for chart in */Chart.yaml; do
            chart_dir="$(dirname "$chart")"
            chart_name="$(basename "$chart_dir")"

            if [ -n "${SELECTED_CHARTS:-}" ]; then
              if ! echo ",${SELECTED_CHARTS}," | grep -q ",${chart_name},"; then
                echo "Skipping ${chart_name}"
                continue
              fi
            fi

            echo "Packaging ${chart_name}"
            helm package "$chart_dir" -d dist
          done

          if ! ls dist/*.tgz >/dev/null 2>&1; then
            echo "No chart selected or packaged"
            exit 1
          fi

          for pkg in dist/*.tgz; do
            name="$(helm show chart "$pkg" | awk -F': ' '$1=="name"{print $2}')"
            ver="$(helm show chart "$pkg" | awk -F': ' '$1=="version"{print $2}')"

            echo "Publishing ${name}:${ver}-dev-${short_sha}"

            tmpdir="$(mktemp -d)"

            tar -xzf "$pkg" -C "$tmpdir"

            yq -i \
              ".version = \"${ver}-dev-${short_sha}\"" \
              "$tmpdir/$name/Chart.yaml"

            helm package "$tmpdir/$name" -d "$tmpdir"

            helm push \
              "$tmpdir/${name}-${ver}-dev-${short_sha}.tgz" \
              "$repo"

            rm -rf "$tmpdir"
          done