name: Publish Helm charts to GHCR (OCI) - manual test builds

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version test (e.g. 1.2.3 or 0.0.0-test)'
        required: true
        default: '0.0.0-test'

      charts:
        description: 'Charts à publier (optionnel: envoy-gateway-policies,envoy-gateway-routes ou vide pour les deux)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Login to GHCR
        run: |
          echo "${{ github.token }}" \
            | helm registry login ghcr.io \
                -u "${{ github.actor }}" \
                --password-stdin

      - name: Build and push charts
        env:
          OWNER: ${{ github.repository_owner }}
          VERSION: ${{ github.event.inputs.version }}
          SELECTED_CHARTS: ${{ github.event.inputs.charts }}
        run: |
          set -euo pipefail

          repo="oci://ghcr.io/${OWNER}/common-helm-charts"

          allowed_charts="envoy-gateway-policies envoy-gateway-routes"

          mkdir -p dist

          echo "Version: $VERSION"
          echo "Selected: ${SELECTED_CHARTS:-all}"

          for chart in */Chart.yaml; do
            dir="$(dirname "$chart")"
            name="$(basename "$dir")"

            # whitelist stricte
            if ! echo "$allowed_charts" | grep -wq "$name"; then
              echo "Skip not allowed: $name"
              continue
            fi

            # filtre input optionnel
            if [ -n "${SELECTED_CHARTS:-}" ]; then
              if ! echo ",$SELECTED_CHARTS," | grep -q ",$name,"; then
                echo "Skip not selected: $name"
                continue
              fi
            fi

            echo "Packaging $name"
            helm package "$dir" -d dist
          done

          for pkg in dist/*.tgz; do
            name="$(helm show chart "$pkg" | awk -F': ' '$1=="name"{print $2}')"

            echo "Processing $name"

            tmpdir="$(mktemp -d)"
            tar -xzf "$pkg" -C "$tmpdir"

            yq -i ".version = \"${VERSION}\"" "$tmpdir/$name/Chart.yaml"

            helm package "$tmpdir/$name" -d "$tmpdir"

            helm push \
              "$tmpdir/${name}-${VERSION}.tgz" \
              "$repo"

            rm -rf "$tmpdir"
          done