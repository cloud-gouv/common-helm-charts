name: Build Helm index (non-main branches)

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-index-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.16.1

      - name: Build Helm repo (index.yaml + tgz)
        run: |
          set -euo pipefail
          outdir="site"
          repo_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          rm -rf "$outdir"
          mkdir -p "$outdir"

          chart_count=0
          for chart in */Chart.yaml; do
            [ -f "$chart" ] || continue
            chart_count=$((chart_count + 1))
            d="${chart%/Chart.yaml}"
            echo "Packaging $d"
            helm package "$d" --destination "$outdir"
          done

          if [ "$chart_count" -eq 0 ]; then
            echo "No Chart.yaml found at repository root"
            exit 1
          fi

          helm repo index "$outdir" --url "$repo_url"

          cat > "$outdir/index.html" <<EOF
          <!doctype html>
          <meta charset="utf-8">
          <title>common-helm-charts</title>
          <p>Helm repository URL: <code>$repo_url</code></p>
          <p>Example: <code>helm repo add common $repo_url</code></p>
          <p>Index file: <a href="./index.yaml">index.yaml</a></p>
          EOF

      - name: Upload generated index artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: helm-repo-site-${{ github.run_id }}
          path: site
          if-no-files-found: error
          retention-days: 7
