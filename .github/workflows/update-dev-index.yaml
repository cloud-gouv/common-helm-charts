name: Update Helm index and packages (non-main branches)

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-index-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-index:
    if: github.ref != 'refs/heads/main' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.16.1

      - name: Build docs/ (index.yaml + tgz)
        run: |
          set -euo pipefail
          outdir="docs"
          repo_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          mkdir -p "$outdir"
          rm -f "$outdir"/*.tgz "$outdir"/index.yaml

          chart_count=0
          for chart in */Chart.yaml; do
            [ -f "$chart" ] || continue
            chart_count=$((chart_count + 1))
            d="${chart%/Chart.yaml}"
            echo "Packaging $d"
            helm package "$d" --destination "$outdir"
          done

          if [ "$chart_count" -eq 0 ]; then
            echo "No Chart.yaml found at repository root"
            exit 1
          fi

          helm repo index "$outdir" --url "$repo_url"

      - name: Commit and push docs updates
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain -- docs)" ]; then
            echo "No docs changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "ci: update docs index and packages [skip ci]"
          git push