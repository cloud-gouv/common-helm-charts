apiVersion: v2
name: client-namespaces
description: A Helm chart for managing namespaces dedicated to clients

# This chart not only deploys namespaces, but also the necessary additional resources
# that are required for the namespaces to be used by clients (i.e. RBAC, NetworkPolicies, etc.)

# A chart can be either an 'application' or a 'library' chart.
type: application

# This is the chart version
# Versions are expected to follow Semantic Versioning (https://semver.org/)
version: 0.1.0

# This is the version number of the application being deployed
# Versions are not expected to follow Semantic Versioning. They should reflect
# the version the application is using.
# It is recommended to use it with quotes.
appVersion: "0.1.0"
